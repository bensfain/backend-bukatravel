{% load i18n admin_urls %}
<small class="text-light fw-semibold">{% blocktrans with filter_title=title %} By {{ filter_title }} {% endblocktrans %}</small>
<div class="demo-inline-spacing mt-3">
	<div class="list-group">
    {% for choice in choices %}
	  <a href="{{ choice.query_string|iriencode }}" class="list-group-item list-group-item-action {% if choice.selected %}active{% endif %} waves-effect">{{ choice.display }}</a>
    {% endfor %}
	</div>
</div>
