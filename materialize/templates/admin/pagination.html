{% load admin_list suit_list custom i18n %}

<div id="pagination_id" class="mt-3 align-content-center">
    {% if pagination_required %}
    <nav aria-label="Page navigation">
      <ul class="pagination pagination-rounded pagination-outline-primary">
        {% for i in page_range %}
          {% custom_paginator_number cl i %}
        {% endfor %}
      </ul>
    </nav>
    {% endif %}

    <div class="pagination-info my-2">
      <label class="">Total {{ cl.result_count }}</label>
      <label class="text">
          {% if cl.result_count == 1 %}
            {{ cl.opts.verbose_name }}
          {% else %}
            {{ cl.opts.verbose_name_plural }}
          {% endif %}
      </label>
      {% if show_all_url %}
          &nbsp;&nbsp;
          <a href="{{ show_all_url }}" class="showall btn btn-xs btn-outline-secondary btn-light">{% trans 'Show all' %}</a>
      {% endif %}
    </div>
</div>
